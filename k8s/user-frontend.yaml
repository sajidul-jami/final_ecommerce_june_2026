apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-frontend
  namespace: website-2026
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-frontend
  template:
    metadata:
      labels:
        app: user-frontend
    spec:
      containers:
        - name: user-frontend
          image: registry.example.com/website2026/user-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: website-2026-config
                  key: USER_API_PUBLIC_URL
            - name: NEXT_PUBLIC_PRODUCT_IMAGE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: website-2026-config
                  key: PRODUCT_IMAGE_PUBLIC_URL
            - name: NEXT_PUBLIC_SITE_URL
              valueFrom:
                configMapKeyRef:
                  name: website-2026-config
                  key: USER_PUBLIC_URL
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-frontend
  namespace: website-2026
spec:
  selector:
    app: user-frontend
  ports:
    - port: 3000
      targetPort: 3000
