apiVersion: v1
kind: ConfigMap
metadata:
  name: website-2026-config
  namespace: website-2026
data:
  DB_HOST: mysql.example.internal
  DB_PORT: "3306"
  DB_NAME: ecommerce
  NODE_ENV: production
  ADMIN_CLIENT_URL: https://admin.example.com
  USER_CLIENT_URL: https://shop.example.com
  USER_CORS_ORIGINS: ""
  ADMIN_CORS_ORIGINS: ""
  USER_PUBLIC_URL: https://shop.example.com
  USER_API_PUBLIC_URL: https://api.example.com
  ADMIN_API_PUBLIC_URL: https://admin-api.example.com/api
  ADMIN_UPLOAD_PUBLIC_URL: https://admin-api.example.com/upload
  PRODUCT_IMAGE_PUBLIC_URL: https://cdn.example.com/products/images/productsimg
  MINIO_ENDPOINT: minio
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_PUBLIC_URL: https://cdn.example.com
