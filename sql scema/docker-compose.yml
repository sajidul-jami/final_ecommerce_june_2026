services:
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: always

    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: 
      MYSQL_DATABASE: ecommerce

    volumes:
      - mysql_data:/var/lib/mysql
      - /ecommerce_dev_used.sql:/docker-entrypoint-initdb.d/init.sql

    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data: